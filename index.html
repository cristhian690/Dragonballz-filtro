<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Dragon Ball Filtro</title>
</head>
<body>

<h2>Seleccionar raza</h2>

<select id="raza">
  <option value="">-- Seleccionar --</option>
  <option value="Saiyan">Saiyan</option>
  <option value="Human">Humano</option>
  <option value="Namekian">Namekiano</option>
</select>

<button onclick="cargar()">Mostrar</button>

<hr>


<table border="1">
<thead>
<tr>
<th>#</th>
<th>Nombre</th>
<th>Ki</th>
<th>Genero</th>
<th>Imagen</th>
<th>Detalle</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>

<hr>


<h3>Personaje</h3>
<h4 id="nombreP"></h4>
<img id="imgP" width="200">

<h4>Transformaciones</h4>
<select id="transformaciones"></select>
<button id="btnVer" onclick="verTransformacion()">Ver</button>

<hr>


<h3>Transformación</h3>
<h4 id="nombreT"></h4>
<img id="imgT" width="200">
<p id="descT"></p>

<hr>


<h3>Descripción del personaje</h3>
<p id="descP"></p>

<script>

let transformaciones = [];
let descripcionPersonaje = "";

function cargar() {
  const raza = document.getElementById("raza").value;

  fetch("https://dragonball-api.com/api/characters?limit=100")
    .then(res => res.json())
    .then(data => {

      let personajes = data.items;

      personajes = personajes.filter(p => p.race === raza);

      let html = "";

      personajes.forEach((p, i) => {
        html += `
          <tr>
            <td>${i+1}</td>
            <td>${p.name}</td>
            <td>${p.ki}</td>
            <td>${p.gender}</td>
            <td><img src="${p.image}" width="50"></td>
            <td><button onclick="verPersonaje(${p.id})">Ver</button></td>
          </tr>
        `;
      });

      document.getElementById("tabla").innerHTML = html;

    });
}

function verPersonaje(id) {

  fetch(`https://dragonball-api.com/api/characters/${id}`)
    .then(res => res.json())
    .then(data => {

      
      document.getElementById("nombreP").textContent = data.name;
      document.getElementById("imgP").src = data.image;

    
      descripcionPersonaje = data.description || "Sin descripción";

      let select = document.getElementById("transformaciones");
      let btn = document.getElementById("btnVer");

      select.innerHTML = "";

  
      if (!data.transformations || data.transformations.length === 0) {

        select.innerHTML = "<option>No tiene transformaciones</option>";
        select.disabled = true;
        btn.disabled = true;

        transformaciones = [];

  
        document.getElementById("nombreT").textContent = data.name;
        document.getElementById("imgT").src = data.image;
        document.getElementById("descT").textContent =
          "Forma base (no tiene transformaciones)";

        document.getElementById("descP").textContent = descripcionPersonaje;

      }else {

        select.disabled = false;
        btn.disabled = false;

        data.transformations.forEach((t, i) => {
          select.innerHTML += `<option value="${i}">${t.name}</option>`;
        });

        transformaciones = data.transformations;

        verTransformacion();
      }

    });
}

function verTransformacion() {

  if (!transformaciones || transformaciones.length === 0) return;

  const index = document.getElementById("transformaciones").value;
  const t = transformaciones[index];

  document.getElementById("nombreT").textContent = t.name;
  document.getElementById("imgT").src = t.image;
  document.getElementById("descT").textContent =
    t.description || "Sin descripción";

 
  document.getElementById("descP").textContent = descripcionPersonaje;
}

</script>

</body>
</html>
